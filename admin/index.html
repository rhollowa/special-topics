<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — ACC Course Sites</title>
<link rel="stylesheet" href="../theme.css">
<style>
.admin-login{max-width:400px;margin:80px auto;padding:2rem;}
.admin-login h1{font-size:1.25rem;margin-bottom:1.5rem;}
.admin-login input[type=password]{width:100%;padding:.6rem .8rem;font-size:1rem;border:1px solid var(--border,#ccc);border-radius:4px;margin-bottom:1rem;box-sizing:border-box;}
.admin-login button{padding:.6rem 1.4rem;font-size:.95rem;cursor:pointer;}
.admin-error{color:#c00;font-size:.9rem;margin-top:.5rem;display:none;}
.admin-panel{display:none;max-width:960px;margin:40px auto;padding:2rem;}
.course-picker{margin-bottom:2rem;}
.course-picker h2{font-size:1rem;font-weight:700;margin-bottom:.75rem;color:var(--text-muted,#666);}
.course-cards{display:flex;gap:.75rem;flex-wrap:wrap;}
.course-card{padding:.6rem 1.2rem;border:1.5px solid var(--border,#ccc);border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;background:var(--surface,#f9f9f9);transition:all .15s;}
.course-card:hover{border-color:#1a7a4a;color:#1a7a4a;}
.course-card.active{background:#1a7a4a;color:#fff;border-color:#1a7a4a;}
.course-label{font-size:.75rem;font-weight:400;opacity:.75;display:block;margin-top:.1rem;}
.admin-nav{display:flex;gap:1rem;margin-bottom:2rem;flex-wrap:wrap;border-top:1px solid var(--border,#eee);padding-top:1.5rem;}
.admin-nav button{padding:.45rem 1rem;font-size:.9rem;cursor:pointer;border-radius:4px;}
.admin-nav button.active{font-weight:600;}
.admin-section{display:none;}
.admin-section.active{display:block;}
table{width:100%;border-collapse:collapse;font-size:.9rem;}
th,td{padding:.4rem .6rem;border:1px solid var(--border,#ddd);text-align:left;}
th{background:var(--surface,#f5f5f5);}
.upload-row{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem;}
.upload-row input,.upload-row select{padding:.45rem .6rem;font-size:.9rem;border:1px solid var(--border,#ccc);border-radius:4px;}
.msg{font-size:.9rem;margin-top:.5rem;}
.msg.ok{color:green;} .msg.err{color:#c00;}
.no-course{color:#888;font-size:.9rem;font-style:italic;}
.course-table{margin-bottom:2rem;border:1px solid var(--border,#ddd);border-radius:6px;overflow:hidden;}
.ct-head{display:grid;grid-template-columns:2fr 1fr 1fr;background:var(--surface,#f5f5f5);font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted,#888);padding:.5rem 1rem;gap:1rem;}
.ct-row{display:grid;grid-template-columns:2fr 1fr 1fr;align-items:center;padding:.75rem 1rem;gap:1rem;border-top:1px solid var(--border,#eee);cursor:pointer;transition:background .12s;}
.ct-row:hover{background:var(--surface,#f9f9f9);}
.ct-row.active{background:#f0faf5;}
.ct-name{font-size:.95rem;font-weight:700;color:var(--ink,#111);}
.ct-sub{font-size:.78rem;color:var(--text-muted,#888);margin-top:.1rem;}
.ct-btn{display:inline-block;padding:.3rem .8rem;font-size:.82rem;border:1px solid var(--border,#ccc);border-radius:4px;color:var(--ink,#111);text-decoration:none;background:#fff;}
.ct-btn:hover{border-color:#1a7a4a;color:#1a7a4a;}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="/" class="crest">Russell Holloway <span class="num">ACC · Admin</span></a>
    <nav class="primary" aria-label="Primary">
      <a href="/">Courses</a>
      <a href="/2305/">BUSI 2305</a>
      <a href="/special-topics/">Special Topics</a>
    </nav>
  </div>
</header>

<main id="main-content">

<!-- LOGIN -->
<div class="admin-login" id="loginBox">
  <h1>Admin Access</h1>
  <input type="password" id="pwInput" placeholder="Password" autocomplete="current-password">
  <button onclick="doLogin()">Enter</button>
  <div class="admin-error" id="loginErr">Incorrect password.</div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">

  <!-- COURSE TABLE -->
  <div class="course-table">
    <div class="ct-head">
      <div class="ct-col-course">Course</div>
      <div class="ct-col-grades">Gradebook</div>
      <div class="ct-col-edit">Edit / Update</div>
    </div>
    <div class="ct-row active" data-course="BUSI-2305" onclick="selectCourse('BUSI-2305',this)">
      <div class="ct-col-course">
        <div class="ct-name">BUSI 2305</div>
        <div class="ct-sub">Business Statistics · Spring 2026</div>
      </div>
      <div class="ct-col-grades">
        <a href="#" class="ct-btn" onclick="event.stopPropagation();showTab('gradebook',document.querySelector('.admin-nav button'));">Gradebook</a>
      </div>
      <div class="ct-col-edit">
        <a href="#" class="ct-btn" onclick="event.stopPropagation();showTab('assignments',document.querySelectorAll('.admin-nav button')[1]);">Edit Course</a>
      </div>
    </div>
  </div>

  <div class="admin-nav">
    <button class="active" onclick="showTab('gradebook',this)">Gradebook</button>
    <button onclick="showTab('assignments',this)">Assignments</button>
    <button onclick="showTab('submissions',this)">Submissions</button>
    <button style="margin-left:auto;font-size:.85rem;" onclick="doLogout()">Log out</button>
  </div>

  <!-- GRADEBOOK TAB -->
  <div class="admin-section active" id="tab-gradebook">
    <h2 style="font-size:1.1rem;margin:0 0 1rem;">Gradebook</h2>
    <div class="upload-row">
      <input type="file" id="gbFile" accept=".csv,.xlsx,.xls">
      <button onclick="uploadGradebook()">Upload BB Export</button>
      <button onclick="exportGradebook()">Export to BB Format</button>
    </div>
    <div class="msg" id="gbMsg"></div>
    <div id="gbTable"></div>
  </div>

  <!-- ASSIGNMENTS TAB -->
  <div class="admin-section" id="tab-assignments">
    <h2 style="font-size:1.1rem;margin:0 0 1rem;">Assignments / Answer Keys</h2>
    <div class="upload-row">
      <input type="text" id="asgId" placeholder="Assignment ID (e.g. exam1)" style="width:160px;">
      <input type="text" id="asgName" placeholder="Name" style="width:200px;">
      <input type="number" id="asgPts" placeholder="Max pts" style="width:90px;" value="100">
      <input type="file" id="asgFile" accept=".xlsx,.xls,.csv,.pdf">
      <button onclick="createAssignment()">Save</button>
    </div>
    <div class="msg" id="asgMsg"></div>
    <div id="asgTable"></div>
  </div>

  <!-- SUBMISSIONS TAB -->
  <div class="admin-section" id="tab-submissions">
    <h2 style="font-size:1.1rem;margin:0 0 1rem;">Submissions</h2>
    <div id="subTable"></div>
  </div>

</div>
</main>

<script>
const API = 'https://tourcast-docker.onrender.com';
const API_KEY = 'c7852252558744ea5bef3c86136edbf31b5e3e556fd447454a4d37b06151b4e7';
let SESSION = null;
let COURSE = 'BUSI-2305';

// ── Auth ──────────────────────────────────────────────────────────
function doLogin(){
  const pw = document.getElementById('pwInput').value;
  fetch(API+'/acc/admin/api-login', {
    method:'POST',
    headers:{'Content-Type':'application/json','X-API-Key':API_KEY},
    body: JSON.stringify({password:pw})
  }).then(r=>r.json()).then(d=>{
    if(d.ok){
      SESSION=d.token;
      document.getElementById('loginBox').style.display='none';
      document.getElementById('adminPanel').style.display='block';
      loadGradebook();
    } else {
      document.getElementById('loginErr').style.display='block';
    }
  }).catch(()=>{document.getElementById('loginErr').style.display='block';});
}

document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function doLogout(){
  SESSION=null;
  document.getElementById('loginBox').style.display='block';
  document.getElementById('adminPanel').style.display='none';
  document.getElementById('pwInput').value='';
  document.getElementById('loginErr').style.display='none';
}

function authHeaders(){
  return {'X-API-Key':API_KEY,'X-Admin-Token':SESSION,'Content-Type':'application/json'};
}

// ── Course picker ─────────────────────────────────────────────────
function selectCourse(course, el){
  COURSE = course;
  document.querySelectorAll('.course-card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  // Reload active tab for new course
  const activeTab = document.querySelector('.admin-section.active');
  if(activeTab){
    const name = activeTab.id.replace('tab-','');
    if(name==='gradebook') loadGradebook();
    if(name==='assignments') loadAssignments();
    if(name==='submissions') loadSubmissions();
  }
}

// ── Tabs ──────────────────────────────────────────────────────────
function showTab(name,btn){
  document.querySelectorAll('.admin-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.admin-nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='gradebook') loadGradebook();
  if(name==='assignments') loadAssignments();
  if(name==='submissions') loadSubmissions();
}

// ── Gradebook ─────────────────────────────────────────────────────
function loadGradebook(){
  if(!SESSION) return;
  fetch(API+'/acc/admin/gradebook/json?course='+encodeURIComponent(COURSE),
    {headers:authHeaders()})
    .then(r=>r.json()).then(d=>{renderGradebook(d);}).catch(()=>{});
}

function renderGradebook(d){
  const el=document.getElementById('gbTable');
  if(!d.rows||!d.rows.length){el.innerHTML='<p style="color:#888;font-size:.9rem;">No records yet.</p>';return;}
  const cols=['Last Name','First Name','Student ID','Email'].concat(d.grade_cols||[]);
  let t='<table><thead><tr>'+cols.map(c=>'<th>'+c+'</th>').join('')+'</tr></thead><tbody>';
  d.rows.forEach(r=>{
    t+='<tr><td>'+esc(r.last_name)+'</td><td>'+esc(r.first_name)+'</td><td>'+esc(r.acc_id)+'</td><td>'+esc(r.email||'')+'</td>';
    (d.grade_cols||[]).forEach(col=>{t+='<td>'+(r.grades&&r.grades[col]!=null?r.grades[col]:'')+'</td>';});
    t+='</tr>';
  });
  t+='</tbody></table>';
  el.innerHTML=t;
}

function uploadGradebook(){
  const f=document.getElementById('gbFile').files[0];
  const msg=document.getElementById('gbMsg');
  if(!f){msg.textContent='Select a file.';msg.className='msg err';return;}
  const fd=new FormData();fd.append('file',f);fd.append('course',COURSE);
  msg.textContent='Uploading…';msg.className='msg';
  fetch(API+'/acc/admin/gradebook/upload',{
    method:'POST',
    headers:{'X-API-Key':API_KEY,'X-Admin-Token':SESSION},
    body:fd
  }).then(r=>r.json()).then(d=>{
    if(d.ok){msg.textContent=`Done — ${d.inserted} inserted, ${d.updated} updated, ${d.skipped} skipped.`;msg.className='msg ok';loadGradebook();}
    else{msg.textContent=d.error||'Error';msg.className='msg err';}
  }).catch(()=>{msg.textContent='Request failed';msg.className='msg err';});
}

function exportGradebook(){
  window.open(API+'/acc/admin/gradebook/export?course='+encodeURIComponent(COURSE)+'&token='+SESSION);
}

// ── Assignments ───────────────────────────────────────────────────
function loadAssignments(){
  if(!SESSION) return;
  fetch(API+'/acc/admin/assignments/json?course='+encodeURIComponent(COURSE),{headers:authHeaders()})
    .then(r=>r.json()).then(d=>renderAssignments(d)).catch(()=>{});
}

function renderAssignments(d){
  const el=document.getElementById('asgTable');
  if(!d.rows||!d.rows.length){el.innerHTML='<p style="color:#888;font-size:.9rem;">No assignments yet.</p>';return;}
  let t='<table><thead><tr><th>ID</th><th>Name</th><th>Max Pts</th><th>Answer Key</th></tr></thead><tbody>';
  d.rows.forEach(r=>{
    t+=`<tr><td>${esc(r.assignment_id)}</td><td>${esc(r.name)}</td><td>${r.max_points}</td><td>${r.answer_key_r2_key?'✓':'—'}</td></tr>`;
  });
  t+='</tbody></table>';
  el.innerHTML=t;
}

function createAssignment(){
  const msg=document.getElementById('asgMsg');
  const fd=new FormData();
  fd.append('course',COURSE);
  fd.append('assignment_id',document.getElementById('asgId').value.trim());
  fd.append('name',document.getElementById('asgName').value.trim());
  fd.append('max_points',document.getElementById('asgPts').value||'100');
  const f=document.getElementById('asgFile').files[0];
  if(f) fd.append('answer_key',f);
  msg.textContent='Saving…';msg.className='msg';
  fetch(API+'/acc/admin/assignments/create',{
    method:'POST',
    headers:{'X-API-Key':API_KEY,'X-Admin-Token':SESSION},
    body:fd
  }).then(r=>{msg.textContent='Saved.';msg.className='msg ok';loadAssignments();})
    .catch(()=>{msg.textContent='Saved.';msg.className='msg ok';loadAssignments();});
}

// ── Submissions ───────────────────────────────────────────────────
function loadSubmissions(){
  if(!SESSION) return;
  const url=API+'/acc/admin/submissions/json?course='+encodeURIComponent(COURSE);
  fetch(url,{headers:authHeaders()}).then(r=>r.json()).then(d=>renderSubmissions(d)).catch(()=>{});
}

function renderSubmissions(d){
  const el=document.getElementById('subTable');
  if(!d.rows||!d.rows.length){el.innerHTML='<p style="color:#888;font-size:.9rem;">No submissions.</p>';return;}
  let t='<table><thead><tr><th>Student</th><th>Course</th><th>File</th><th>Date</th><th></th></tr></thead><tbody>';
  d.rows.forEach(r=>{
    t+=`<tr><td>${esc(r.student)}</td><td>${esc(r.course)}</td><td>${esc(r.filename)}</td><td>${esc(r.submitted_at||'')}</td><td><a href="${API}/acc/admin/download/${r.id}?token=${SESSION}" target="_blank">Download</a></td></tr>`;
  });
  t+='</tbody></table>';
  el.innerHTML=t;
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>

</body>
</html>
