<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Upload</title>
<link rel="stylesheet" href="../theme.css">
<style>
body{font-family:system-ui,-apple-system,sans-serif;}
.wrap{max-width:560px;margin:80px auto;padding:2rem;}
h1{font-size:1.4rem;margin:0 0 1.5rem;}
.drop{border:2px dashed var(--border,#ccc);border-radius:8px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;}
.drop:hover,.drop.drag{border-color:#1a7a4a;background:#f5fbf7;}
.drop p{margin:.5rem 0;color:#666;}
.drop .file{font-weight:600;color:#1a7a4a;}
.drop input{display:none;}
.actions{margin-top:1.5rem;display:flex;gap:.75rem;justify-content:center;}
button{padding:.55rem 1.2rem;font-size:.95rem;cursor:pointer;border-radius:4px;border:1px solid #ccc;background:#fff;}
button.primary{background:#1a7a4a;color:#fff;border-color:#1a7a4a;}
button:disabled{opacity:.4;cursor:not-allowed;}
.msg{margin-top:1rem;font-size:.9rem;min-height:1.2em;text-align:center;}
.msg.ok{color:#1a7a4a;} .msg.err{color:#c00;}
.login{max-width:380px;margin:120px auto;padding:2rem;}
.login input{width:100%;padding:.6rem .8rem;font-size:1rem;border:1px solid #ccc;border-radius:4px;margin-bottom:1rem;box-sizing:border-box;}
.login button{width:100%;padding:.6rem;}
.login .err{color:#c00;font-size:.9rem;margin-top:.5rem;display:none;text-align:center;}
.hidden{display:none;}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="/" class="crest">Russell Holloway <span class="num">ACC · Admin</span></a>
  </div>
</header>

<main>

<!-- LOGIN -->
<div class="login" id="loginBox">
  <h1>Admin Access</h1>
  <input type="password" id="pwInput" placeholder="Password" autocomplete="current-password">
  <button class="primary" onclick="doLogin()">Sign In</button>
  <div class="err" id="loginErr">Incorrect password.</div>
</div>

<!-- UPLOAD -->
<div class="wrap hidden" id="uploadBox">
  <h1>Upload</h1>
  <label class="drop" id="dropZone">
    <p id="dropText">Click or drop a file</p>
    <p class="file" id="fileName"></p>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.pdf,.docx,.doc">
  </label>
  <div class="actions">
    <button class="primary" id="uploadBtn" onclick="doUpload()" disabled>Upload</button>
    <button onclick="doLogout()">Log out</button>
  </div>
  <div class="msg" id="msg"></div>
</div>

</main>

<script>
const API = 'https://tourcast-docker.onrender.com';
const API_KEY = 'c7852252558744ea5bef3c86136edbf31b5e3e556fd447454a4d37b06151b4e7';
const CREDS = { credentials: 'include' };

function authHeaders() {
  const t = sessionStorage.getItem('adminToken');
  const h = { 'X-API-Key': API_KEY };
  if (t) h['X-Admin-Token'] = t;
  return h;
}

function authFetch(path, opts={}) {
  const headers = Object.assign({}, authHeaders(), opts.headers||{});
  return fetch(API + path, Object.assign({}, CREDS, opts, { headers }));
}

// ── Auth ────────────────────────────────────────────────────────────
async function checkAuth() {
  try {
    const r = await authFetch('/acc/admin/login');
    if (r.ok) showUpload();
  } catch(e) {}
}

async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  try {
    const r = await fetch(API + '/acc/admin/password-auth', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
      body: JSON.stringify({ password: pw })
    });
    const d = await r.json();
    if (d.ok) {
      if (d.token) sessionStorage.setItem('adminToken', d.token);
      showUpload();
    } else {
      err.style.display = 'block';
    }
  } catch(e) {
    err.textContent = 'Login failed: ' + e.message;
    err.style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.removeItem('adminToken');
  location.reload();
}

function showUpload() {
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('uploadBox').classList.remove('hidden');
}

// ── Upload ──────────────────────────────────────────────────────────
let selectedFile = null;

const zone   = document.getElementById('dropZone');
const input  = document.getElementById('fileInput');
const dropTx = document.getElementById('dropText');
const fname  = document.getElementById('fileName');
const btn    = document.getElementById('uploadBtn');

input.addEventListener('change', e => setFile(e.target.files[0]));

['dragenter','dragover'].forEach(ev => zone.addEventListener(ev, e => {
  e.preventDefault(); zone.classList.add('drag');
}));
['dragleave','drop'].forEach(ev => zone.addEventListener(ev, e => {
  e.preventDefault(); zone.classList.remove('drag');
}));
zone.addEventListener('drop', e => {
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});

function setFile(f) {
  if (!f) return;
  selectedFile = f;
  fname.textContent = f.name;
  dropTx.textContent = 'Click or drop to change';
  btn.disabled = false;
}

async function doUpload() {
  if (!selectedFile) return;
  const msg = document.getElementById('msg');
  msg.textContent = 'Uploading…';
  msg.className = 'msg';
  btn.disabled = true;

  const fd = new FormData();
  fd.append('file', selectedFile);

  try {
    const r = await authFetch('/acc/admin/upload', { method: 'POST', body: fd });
    const d = await r.json();
    if (d.ok) {
      msg.textContent = 'Uploaded: ' + d.filename;
      msg.className = 'msg ok';
      selectedFile = null;
      input.value = '';
      fname.textContent = '';
      dropTx.textContent = 'Click or drop a file';
    } else {
      msg.textContent = d.error || 'Upload failed.';
      msg.className = 'msg err';
      btn.disabled = false;
    }
  } catch(e) {
    msg.textContent = 'Upload failed: ' + e.message;
    msg.className = 'msg err';
    btn.disabled = false;
  }
}

// Enter key submits login
document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

checkAuth();
</script>

</body>
</html>
