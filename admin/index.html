<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — ACC Course Sites</title>
<link rel="stylesheet" href="../theme.css">
<style>
.admin-login{max-width:400px;margin:80px auto;padding:2rem;}
.admin-login h1{font-size:1.25rem;margin-bottom:1.5rem;}
.admin-login input[type=password]{width:100%;padding:.6rem .8rem;font-size:1rem;border:1px solid var(--border,#ccc);border-radius:4px;margin-bottom:1rem;box-sizing:border-box;}
.admin-login button{padding:.6rem 1.4rem;font-size:.95rem;cursor:pointer;}
.admin-error{color:#c00;font-size:.9rem;margin-top:.5rem;display:none;}
.admin-panel{display:none;max-width:960px;margin:40px auto;padding:2rem;}

/* Course table */
.course-table{margin-bottom:2rem;border:1px solid var(--border,#ddd);border-radius:6px;overflow:hidden;}
.ct-head{display:grid;grid-template-columns:2fr 1fr 1fr;background:var(--surface,#f5f5f5);font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted,#888);padding:.5rem 1rem;gap:1rem;}
.ct-row{display:grid;grid-template-columns:2fr 1fr 1fr;align-items:center;padding:.75rem 1rem;gap:1rem;border-top:1px solid var(--border,#eee);}
.ct-name{font-size:.95rem;font-weight:700;color:var(--ink,#111);}
.ct-sub{font-size:.78rem;color:var(--text-muted,#888);margin-top:.1rem;}
.ct-btn{display:inline-block;padding:.3rem .9rem;font-size:.82rem;border:1px solid var(--border,#ccc);border-radius:4px;color:var(--ink,#111);text-decoration:none;background:#fff;cursor:pointer;}
.ct-btn:hover{border-color:#1a7a4a;color:#1a7a4a;}
.ct-btn.danger:hover{border-color:#c00;color:#c00;}
.ct-add-row{padding:.75rem 1rem;border-top:1px solid var(--border,#eee);}

/* Modal overlay */
.gb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;}
.gb-overlay.open{display:flex;}
.gb-modal{background:#fff;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.18);width:92vw;max-width:900px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.gb-modal-head{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem;border-bottom:1px solid var(--border,#eee);flex-shrink:0;}
.gb-modal-head h2{font-size:1rem;font-weight:700;margin:0;}
.gb-modal-actions{display:flex;gap:.5rem;align-items:center;}
.gb-modal-body{overflow:auto;flex:1;padding:1.25rem;}
.gb-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:#888;line-height:1;padding:.1rem .4rem;}
.gb-close:hover{color:#111;}

/* Upload zone */
.gb-upload-zone{border:2px dashed var(--border,#ccc);border-radius:8px;padding:2.5rem;text-align:center;cursor:pointer;transition:border-color .15s;}
.gb-upload-zone:hover{border-color:#1a7a4a;}
.gb-upload-zone p{margin:.5rem 0 0;font-size:.9rem;color:#888;}
.gb-upload-zone input{display:none;}

/* Editable grade grid */
.gb-grid-wrap{overflow-x:auto;}
.gb-grid{border-collapse:collapse;width:100%;font-size:.85rem;}
.gb-grid th{background:var(--surface,#f5f5f5);padding:.4rem .6rem;border:1px solid var(--border,#ddd);white-space:nowrap;font-weight:600;position:sticky;top:0;}
.gb-grid th.col-asg{cursor:pointer;position:relative;}
.gb-grid th.col-asg:hover{background:#e8f5ee;}
.gb-grid td{padding:0;border:1px solid var(--border,#eee);}
.gb-grid td.fixed{padding:.35rem .6rem;color:#555;white-space:nowrap;}
.gb-grid td input{width:100%;border:none;padding:.35rem .5rem;font-size:.85rem;background:transparent;text-align:center;}
.gb-grid td input:focus{background:#fffde7;outline:none;}
.gb-grid tr:hover td{background:#fafafa;}
.gb-add-col{background:none;border:1px dashed var(--border,#ccc);border-radius:4px;padding:.25rem .7rem;font-size:.8rem;cursor:pointer;color:#888;margin-top:.75rem;}
.gb-add-col:hover{border-color:#1a7a4a;color:#1a7a4a;}
.gb-toolbar{display:flex;gap:.6rem;align-items:center;margin-bottom:.85rem;flex-wrap:wrap;}
.msg{font-size:.85rem;margin-top:.4rem;}
.msg.ok{color:green;} .msg.err{color:#c00;}

/* Add col modal */
.col-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1100;align-items:center;justify-content:center;}
.col-modal.open{display:flex;}
.col-modal-inner{background:#fff;border-radius:8px;padding:1.5rem;width:340px;box-shadow:0 4px 24px rgba(0,0,0,.15);}
.col-modal-inner h3{margin:0 0 1rem;font-size:1rem;}
.col-modal-inner label{display:block;font-size:.82rem;font-weight:600;margin-bottom:.25rem;}
.col-modal-inner input{width:100%;padding:.5rem .65rem;border:1px solid var(--border,#ccc);border-radius:4px;font-size:.9rem;margin-bottom:.75rem;box-sizing:border-box;}
.col-modal-row{display:flex;gap:.5rem;justify-content:flex-end;}

/* Add course modal */
.ac-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1100;align-items:flex-start;justify-content:center;overflow-y:auto;padding:2rem 1rem;}
.ac-modal.open{display:flex;}
.ac-modal-inner{background:#fff;border-radius:10px;padding:1.75rem;width:100%;max-width:560px;box-shadow:0 8px 40px rgba(0,0,0,.2);margin:auto;}
.ac-modal-inner h3{margin:0 0 1.25rem;font-size:1.05rem;font-weight:700;}
.ac-field-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem;}
.ac-field-row.full{grid-template-columns:1fr;}
.ac-field label{display:block;font-size:.78rem;font-weight:600;margin-bottom:.2rem;color:var(--text-muted,#666);}
.ac-field input,.ac-field select{width:100%;padding:.5rem .65rem;border:1px solid var(--border,#ccc);border-radius:4px;font-size:.88rem;box-sizing:border-box;}
.ac-fetch-bar{display:flex;gap:.5rem;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border,#eee);}
.ac-fetch-bar input{flex:1;padding:.5rem .65rem;border:1px solid var(--border,#ccc);border-radius:4px;font-size:.82rem;}
.ac-fetch-status{font-size:.8rem;margin-top:.35rem;min-height:1.1em;}
.ac-fetch-status.ok{color:#1a7a4a;}
.ac-fetch-status.err{color:#c00;}
.ac-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border,#eee);}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="/" class="crest">Russell Holloway <span class="num">ACC · Admin</span></a>
    <nav class="primary" aria-label="Primary">
      <a href="/">Courses</a>
      <a href="/2305/">BUSI 2305</a>
      <a href="/special-topics/">Special Topics</a>
    </nav>
  </div>
</header>

<main id="main-content">

<!-- LOGIN -->
<div class="admin-login" id="loginBox">
  <h1>Admin Access</h1>
  <input type="password" id="pwInput" placeholder="Password" autocomplete="current-password">
  <label style="display:flex;align-items:center;gap:.5rem;font-size:.85rem;margin-bottom:.9rem;cursor:pointer;">
    <input type="checkbox" id="rememberDevice"> Remember this device
  </label>
  <button onclick="doLogin()">Enter</button>
  <div class="admin-error" id="loginErr">Incorrect password.</div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">

  <!-- COURSE TABLE -->
  <div class="course-table" id="courseTable">
    <div class="ct-head">
      <div>Course</div>
      <div>Gradebook</div>
      <div>Edit / Update</div>
    </div>
    <!-- Rows injected by loadCourses() -->
    <div id="courseRows"></div>
    <div class="ct-add-row">
      <button class="ct-btn" onclick="openAddCourse()">+ Add Course</button>
    </div>
  </div>

</div><!-- /admin-panel -->

<!-- GRADEBOOK MODAL -->
<div class="gb-overlay" id="gbOverlay" onclick="overlayClick(event)">
  <div class="gb-modal">
    <div class="gb-modal-head">
      <h2 id="gbModalTitle">Gradebook</h2>
      <div class="gb-modal-actions">
        <button class="ct-btn" onclick="triggerUpload()">Upload BB Export</button>
        <button class="ct-btn" onclick="exportGradebook()">Export to BB</button>
        <button class="gb-close" onclick="closeGradebook()">×</button>
      </div>
    </div>
    <div class="gb-modal-body">
      <div class="msg" id="gbMsg"></div>
      <!-- Upload zone (shown when empty) -->
      <div class="gb-upload-zone" id="gbUploadZone" onclick="document.getElementById('gbFileInput').click()">
        <svg width="32" height="32" fill="none" stroke="#aaa" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 16V8m0 0-3 3m3-3 3 3"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        <p>Click to upload a Blackboard gradebook export (.csv or .xlsx)</p>
        <input type="file" id="gbFileInput" accept=".csv,.xlsx,.xls" onchange="handleUpload(this.files[0])">
      </div>
      <!-- Grid (shown when students exist) -->
      <div id="gbGridWrap" style="display:none;">
        <div class="gb-toolbar">
          <button class="gb-add-col" onclick="openAddCol()">+ Add assignment / quiz / participation</button>
        </div>
        <div class="gb-grid-wrap">
          <table class="gb-grid" id="gbGridTable"></table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADD COLUMN MODAL -->
<div class="col-modal" id="colModal">
  <div class="col-modal-inner">
    <h3>Add Grade Column</h3>
    <label>Column name</label>
    <input type="text" id="colName" placeholder="e.g. Quiz 3, Participation, Exam 1">
    <label>Max points</label>
    <input type="number" id="colPts" value="100" min="0">
    <div class="col-modal-row">
      <button class="ct-btn" onclick="closeAddCol()">Cancel</button>
      <button class="ct-btn" style="background:#1a7a4a;color:#fff;border-color:#1a7a4a;" onclick="confirmAddCol()">Add</button>
    </div>
  </div>
</div>

<!-- ADD COURSE MODAL -->
<div class="ac-modal" id="acModal" onclick="acOverlayClick(event)">
  <div class="ac-modal-inner" id="acModalInner">
    <h3>Add Course</h3>

    <!-- ACC fetch bar -->
    <div>
      <p style="font-size:.82rem;color:#666;margin:0 0 .5rem;">Paste your ACC schedule URL to auto-fill fields.</p>
      <div class="ac-fetch-bar">
        <input type="text" id="acFetchUrl" placeholder="https://www6.austincc.edu/schedule/index.php?op=browse&...">
        <button class="ct-btn" onclick="fetchFromACC()">Fetch</button>
      </div>
      <div class="ac-fetch-status" id="acFetchStatus"></div>
    </div>

    <!-- Form fields -->
    <div class="ac-field-row">
      <div class="ac-field">
        <label>Course Number *</label>
        <input type="text" id="acCourseNum" placeholder="BUSI 2305">
      </div>
      <div class="ac-field">
        <label>Section / Course ID</label>
        <input type="text" id="acSectionId" placeholder="85423">
      </div>
    </div>
    <div class="ac-field-row full">
      <div class="ac-field">
        <label>Title</label>
        <input type="text" id="acTitle" placeholder="Business Statistics">
      </div>
    </div>
    <div class="ac-field-row">
      <div class="ac-field">
        <label>Semester</label>
        <input type="text" id="acSemester" placeholder="Fall 2026">
      </div>
      <div class="ac-field">
        <label>Term</label>
        <input type="text" id="acTerm" placeholder="8-Week, Spring B, Full Semester">
      </div>
    </div>
    <div class="ac-field-row">
      <div class="ac-field">
        <label>Delivery</label>
        <select id="acDelivery">
          <option value="">— select —</option>
          <option value="Online">Online</option>
          <option value="In Person">In Person</option>
          <option value="Hybrid">Hybrid</option>
        </select>
      </div>
      <div class="ac-field">
        <label>Days / Times</label>
        <input type="text" id="acDaysTimes" placeholder="MWF 10:00-10:50 AM">
      </div>
    </div>
    <div class="ac-field-row">
      <div class="ac-field">
        <label>Start Date</label>
        <input type="date" id="acStartDate">
      </div>
      <div class="ac-field">
        <label>End Date</label>
        <input type="date" id="acEndDate">
      </div>
    </div>
    <div class="ac-field-row full">
      <div class="ac-field">
        <label>Location / Room</label>
        <input type="text" id="acLocation" placeholder="NRG 1234 or Online">
      </div>
    </div>
    <div class="ac-actions">
      <button class="ct-btn" onclick="closeAddCourse()">Cancel</button>
      <button class="ct-btn" style="background:#1a7a4a;color:#fff;border-color:#1a7a4a;" onclick="saveNewCourse()">Save Course</button>
    </div>
    <div class="msg" id="acMsg" style="margin-top:.5rem;"></div>
  </div>
</div>

</main>

<script>
const API = 'https://tourcast-docker.onrender.com';
const API_KEY = 'c7852252558744ea5bef3c86136edbf31b5e3e556fd447454a4d37b06151b4e7';
let SESSION = null;
let COURSE = null;
let GB_DATA = null;

const DEVICE_KEY = 'acc_device_token';

// ── Boot: try device token first ──────────────────────────────────
(function tryDeviceLogin(){
  const dt = localStorage.getItem(DEVICE_KEY);
  if(!dt) return;
  fetch(API+'/acc/admin/device-login',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-API-Key':API_KEY},
    body:JSON.stringify({device_token:dt})
  }).then(r=>r.json()).then(d=>{
    if(d.ok){
      SESSION=d.token;
      document.getElementById('loginBox').style.display='none';
      document.getElementById('adminPanel').style.display='block';
      loadCourses();
    } else {
      localStorage.removeItem(DEVICE_KEY);
    }
  }).catch(()=>{});
})();

// ── Auth ──────────────────────────────────────────────────────────
function doLogin(){
  const pw = document.getElementById('pwInput').value;
  const remember = document.getElementById('rememberDevice').checked;
  fetch(API+'/acc/admin/api-login',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-API-Key':API_KEY},
    body:JSON.stringify({password:pw})
  }).then(r=>r.json()).then(d=>{
    if(d.ok){
      SESSION=d.token;
      document.getElementById('loginBox').style.display='none';
      document.getElementById('adminPanel').style.display='block';
      if(remember) registerDevice(d.token);
      loadCourses();
    } else {
      document.getElementById('loginErr').style.display='block';
    }
  }).catch(()=>{document.getElementById('loginErr').style.display='block';});
}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function registerDevice(sessionToken){
  const label = navigator.userAgent.substring(0,100);
  fetch(API+'/acc/admin/device-register',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-API-Key':API_KEY},
    body:JSON.stringify({session_token:sessionToken, label})
  }).then(r=>r.json()).then(d=>{
    if(d.ok) localStorage.setItem(DEVICE_KEY, d.device_token);
  }).catch(()=>{});
}

function authHeaders(){
  return {'X-API-Key':API_KEY,'X-Admin-Token':SESSION,'Content-Type':'application/json'};
}

// ── Course list ───────────────────────────────────────────────────
function loadCourses(){
  fetch(API+'/acc/admin/courses/list',{headers:authHeaders()})
    .then(r=>r.json())
    .then(d=>{
      const wrap = document.getElementById('courseRows');
      if(!d.courses || !d.courses.length){ wrap.innerHTML=''; return; }
      wrap.innerHTML = d.courses.map(c => {
        const sub = [c.semester, c.term, c.delivery].filter(Boolean).join(' · ');
        // course_num as the gradebook key (matches existing BUSI-2305 pattern)
        const key = c.course_num.replace(/\s+/g,'-');
        return `<div class="ct-row">
          <div>
            <div class="ct-name">${esc(c.course_num)}${c.section_id ? ' <span style="font-weight:400;font-size:.8rem;color:#888;">#'+esc(c.section_id)+'</span>' : ''}</div>
            <div class="ct-sub">${esc(c.title || '')}${sub ? ' · '+esc(sub) : ''}</div>
          </div>
          <div><button class="ct-btn" onclick="openGradebook('${esc(key)}')">Gradebook</button></div>
          <div style="display:flex;gap:.4rem;flex-wrap:wrap;">
            <button class="ct-btn" onclick="openEdit('${esc(key)}')">Edit Course</button>
            <button class="ct-btn danger" onclick="deleteCourse(${c.id})">Remove</button>
          </div>
        </div>`;
      }).join('');
    }).catch(()=>{});
}

function deleteCourse(id){
  if(!confirm('Remove this course from the admin panel?')) return;
  fetch(API+'/acc/admin/courses/'+id+'/delete',{method:'POST',headers:authHeaders()})
    .then(r=>r.json()).then(d=>{ if(d.ok) loadCourses(); });
}

// ── Gradebook modal ───────────────────────────────────────────────
function openGradebook(course){
  COURSE = course;
  document.getElementById('gbModalTitle').textContent = 'Gradebook — '+course;
  document.getElementById('gbMsg').textContent='';
  document.getElementById('gbOverlay').classList.add('open');
  fetchGradebook();
}

function closeGradebook(){
  document.getElementById('gbOverlay').classList.remove('open');
}

function overlayClick(e){
  if(e.target===document.getElementById('gbOverlay')) closeGradebook();
}

function fetchGradebook(){
  fetch(API+'/acc/admin/gradebook/json?course='+encodeURIComponent(COURSE),{headers:authHeaders()})
    .then(r=>r.json())
    .then(d=>{
      GB_DATA = d;
      if(!d.rows||!d.rows.length){
        document.getElementById('gbUploadZone').style.display='block';
        document.getElementById('gbGridWrap').style.display='none';
      } else {
        document.getElementById('gbUploadZone').style.display='none';
        document.getElementById('gbGridWrap').style.display='block';
        renderGrid(d);
      }
    }).catch(()=>{});
}

function renderGrid(d){
  const cols = d.grade_cols || [];
  const asgMap = {};
  (d.assignments||[]).forEach(a=>{ asgMap[a.assignment_id]=a; });

  let thead = '<thead><tr><th>Last Name</th><th>First Name</th><th>Student ID</th>';
  cols.forEach(col=>{
    const pts = asgMap[col] ? ' <span style="font-weight:400;opacity:.6;">/'+asgMap[col].max_points+'</span>' : '';
    thead += `<th class="col-asg" title="${col}">${esc(col)}${pts}</th>`;
  });
  thead += '</tr></thead>';

  let tbody = '<tbody>';
  d.rows.forEach(r=>{
    tbody += `<tr>
      <td class="fixed">${esc(r.last_name)}</td>
      <td class="fixed">${esc(r.first_name)}</td>
      <td class="fixed">${esc(r.acc_id)}</td>`;
    cols.forEach(col=>{
      const val = (r.grades&&r.grades[col]!=null) ? r.grades[col] : '';
      tbody += `<td><input type="number" value="${esc(String(val))}" min="0"
        onblur="saveGrade('${esc(r.acc_id)}','${esc(col)}',this.value)"
        onkeydown="if(event.key==='Enter')this.blur()"></td>`;
    });
    tbody += '</tr>';
  });
  tbody += '</tbody>';

  document.getElementById('gbGridTable').innerHTML = thead + tbody;
}

function saveGrade(acc_id, assignment_id, score){
  fetch(API+'/acc/admin/gradebook/grade',{
    method:'POST',
    headers:authHeaders(),
    body:JSON.stringify({course:COURSE, acc_id, assignment_id, score: score===''?null:parseFloat(score)})
  }).catch(()=>{});
}

// ── Upload ────────────────────────────────────────────────────────
function triggerUpload(){
  document.getElementById('gbFileInput').click();
}

function handleUpload(file){
  if(!file) return;
  const msg=document.getElementById('gbMsg');
  msg.textContent='Uploading…';msg.className='msg';
  const fd=new FormData();fd.append('file',file);fd.append('course',COURSE);
  fetch(API+'/acc/admin/gradebook/upload',{
    method:'POST',
    headers:{'X-API-Key':API_KEY,'X-Admin-Token':SESSION},
    body:fd
  }).then(r=>r.json()).then(d=>{
    if(d.ok){
      msg.textContent=`Imported — ${d.inserted} new, ${d.updated} updated.`;
      msg.className='msg ok';
      fetchGradebook();
    } else {
      msg.textContent=d.error||'Error';msg.className='msg err';
    }
  }).catch(()=>{msg.textContent='Upload failed';msg.className='msg err';});
}

function exportGradebook(){
  if(!COURSE) return;
  window.open(API+'/acc/admin/gradebook/export?course='+encodeURIComponent(COURSE)+'&token='+SESSION);
}

// ── Add column ────────────────────────────────────────────────────
function openAddCol(){
  document.getElementById('colName').value='';
  document.getElementById('colPts').value='100';
  document.getElementById('colModal').classList.add('open');
  setTimeout(()=>document.getElementById('colName').focus(),50);
}

function closeAddCol(){
  document.getElementById('colModal').classList.remove('open');
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeGradebook();closeAddCol();closeAddCourse();}
});

function confirmAddCol(){
  const name = document.getElementById('colName').value.trim();
  const pts  = parseFloat(document.getElementById('colPts').value)||100;
  if(!name) return;
  closeAddCol();

  const id = name.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
  const fd = new FormData();
  fd.append('course', COURSE);
  fd.append('assignment_id', id);
  fd.append('name', name);
  fd.append('max_points', pts);
  fetch(API+'/acc/admin/assignments/create',{
    method:'POST',
    headers:{'X-API-Key':API_KEY,'X-Admin-Token':SESSION},
    body:fd
  }).then(()=>{
    if(GB_DATA){
      if(!GB_DATA.grade_cols) GB_DATA.grade_cols=[];
      if(!GB_DATA.grade_cols.includes(id)){
        GB_DATA.grade_cols.push(id);
        if(!GB_DATA.assignments) GB_DATA.assignments=[];
        GB_DATA.assignments.push({assignment_id:id,name,max_points:pts});
      }
      document.getElementById('gbUploadZone').style.display='none';
      document.getElementById('gbGridWrap').style.display='block';
      renderGrid(GB_DATA);
    }
  }).catch(()=>{});
}

// ── Edit course (placeholder) ─────────────────────────────────────
function openEdit(course){
  alert('Edit course coming soon.');
}

// ── Add Course modal ──────────────────────────────────────────────
function openAddCourse(){
  // Clear form
  ['acCourseNum','acSectionId','acTitle','acSemester','acTerm','acDaysTimes','acLocation','acFetchUrl'].forEach(id=>{
    document.getElementById(id).value='';
  });
  document.getElementById('acDelivery').value='';
  document.getElementById('acStartDate').value='';
  document.getElementById('acEndDate').value='';
  document.getElementById('acFetchStatus').textContent='';
  document.getElementById('acFetchStatus').className='ac-fetch-status';
  document.getElementById('acMsg').textContent='';
  document.getElementById('acMsg').className='msg';
  document.getElementById('acModal').classList.add('open');
}

function closeAddCourse(){
  document.getElementById('acModal').classList.remove('open');
}

function acOverlayClick(e){
  if(e.target===document.getElementById('acModal')) closeAddCourse();
}

// Client-side fetch of ACC schedule page (browser bypasses robots.txt)
function fetchFromACC(){
  const url = document.getElementById('acFetchUrl').value.trim();
  const status = document.getElementById('acFetchStatus');
  if(!url){ status.textContent='Paste a URL first.'; status.className='ac-fetch-status err'; return; }
  status.textContent='Fetching…'; status.className='ac-fetch-status';

  fetch(url)
    .then(r=>r.text())
    .then(html=>{
      const parsed = parseACCSchedule(html, url);
      if(!parsed){ status.textContent='Could not parse schedule page — fill fields manually.'; status.className='ac-fetch-status err'; return; }
      // Fill whatever we found
      if(parsed.course_num)  document.getElementById('acCourseNum').value  = parsed.course_num;
      if(parsed.section_id)  document.getElementById('acSectionId').value  = parsed.section_id;
      if(parsed.title)       document.getElementById('acTitle').value       = parsed.title;
      if(parsed.semester)    document.getElementById('acSemester').value    = parsed.semester;
      if(parsed.term)        document.getElementById('acTerm').value        = parsed.term;
      if(parsed.delivery)    document.getElementById('acDelivery').value    = parsed.delivery;
      if(parsed.days_times)  document.getElementById('acDaysTimes').value   = parsed.days_times;
      if(parsed.start_date)  document.getElementById('acStartDate').value   = parsed.start_date;
      if(parsed.end_date)    document.getElementById('acEndDate').value     = parsed.end_date;
      if(parsed.location)    document.getElementById('acLocation').value    = parsed.location;
      status.textContent='Filled from ACC — review and save.'; status.className='ac-fetch-status ok';
    })
    .catch(err=>{
      status.textContent='Fetch failed (CORS or network). Fill fields manually.';
      status.className='ac-fetch-status err';
    });
}

function parseACCSchedule(html, url){
  // Parse URL params
  const params = new URLSearchParams((url.split('?')[1])||'');
  const termCode = params.get('term') || '';
  const yr = params.get('yr') || '';

  // Semester from page header: "Credit Summer 2026", "Credit Fall 2026", etc.
  let semester = '';
  const semMatch = html.match(/Course Schedule by Instructor\s*-\s*\(([^)]+)\)/i);
  if(semMatch) semester = semMatch[1].trim();  // e.g. "Credit Summer 2026"
  // Simplify: strip "Credit "
  semester = semester.replace(/^Credit\s+/i,'').trim();

  // DOMParser for structured extraction
  const doc = new DOMParser().parseFromString(html, 'text/html');

  const result = {semester};

  // Course number + title from h4 link: "BUSI 2305 Business Statistics"
  const h4 = doc.querySelector('h4 a');
  if(h4){
    const txt = h4.textContent.trim();
    // e.g. "BUSI 2305 Business Statistics"
    const m = txt.match(/^([A-Z]{2,5}\s+\d{4}[A-Z]?)\s+(.+)$/);
    if(m){ result.course_num = m[1]; result.title = m[2]; }
    else { result.course_num = txt; }
  }

  // Term type from <p class='teach_term'>: "10 Week Session: June 1 - August 9"
  const termP = doc.querySelector("p.teach_term");
  if(termP){
    const txt = termP.textContent.trim();
    // Extract term label before colon
    const termM = txt.match(/^([^:]+):\s*(.+)$/);
    if(termM){
      result.term = termM[1].trim();  // "10 Week Session"
      // Extract dates from "June 1 - August 9" + year from semester
      const dateRange = termM[2].trim();
      const drM = dateRange.match(/(\w+ \d+)\s*-\s*(\w+ \d+)/);
      if(drM && yr){
        result.start_date = parseMonthDay(drM[1], yr);
        result.end_date   = parseMonthDay(drM[2], yr);
      }
    }
  }

  // Section table: synonym number + section type + campus + room + dates
  // Table row with section data — look for the synonym (5-6 digit number)
  const tds = Array.from(doc.querySelectorAll('table.section_line_odd td, table.section_line_even td'))
    .map(td=>td.textContent.trim());

  // Synonym number: 5-6 digit standalone cell
  for(const td of tds){
    if(/^\d{5,6}$/.test(td)){ result.section_id = td; break; }
  }

  // Delivery: look for ONL, DIL, HYB in table cells or body text
  const bodyText = doc.body ? doc.body.textContent : '';
  if(/\bONL\b|online/i.test(bodyText)) result.delivery = 'Online';
  else if(/\bHYB\b|hybrid/i.test(bodyText)) result.delivery = 'Hybrid';
  else result.delivery = 'In Person';

  // Days/Times: look for day patterns in table cells
  for(const td of tds){
    const m = td.match(/\b(Mon|Tue|Wed|Thu|Fri|Sat|Sun|M|T|W|Th|F|MWF|TTh|MW)[^,\n]*/i);
    if(m){ result.days_times = m[0].trim(); break; }
  }
  // Online courses typically have no meeting times
  if(!result.days_times && result.delivery==='Online') result.days_times = '';

  // Location: campus code from table (ONL, NRG, HLC, etc.)
  for(const td of tds){
    if(/^(ONL|NRG|HLC|RGC|SAC|CYP|EVC|PIN|RVS|SCC|SVC|HWY|RGS|HBC|ANS)\b/.test(td)){
      result.location = td; break;
    }
  }

  return result;
}

function parseMonthDay(str, yr){
  // "June 1" → "2026-06-01"
  const months = {January:'01',February:'02',March:'03',April:'04',May:'05',June:'06',
    July:'07',August:'08',September:'09',October:'10',November:'11',December:'12',
    Jan:'01',Feb:'02',Mar:'03',Apr:'04',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  const m = str.trim().match(/^(\w+)\s+(\d+)$/);
  if(!m) return '';
  const mon = months[m[1]];
  if(!mon) return '';
  return `${yr}-${mon}-${m[2].padStart(2,'0')}`;
}


function toISODate(mdY){
  // MM/DD/YYYY → YYYY-MM-DD
  const p = mdY.split('/');
  if(p.length!==3) return '';
  return `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
}

function saveNewCourse(){
  const course_num = document.getElementById('acCourseNum').value.trim();
  if(!course_num){ document.getElementById('acMsg').textContent='Course number is required.'; document.getElementById('acMsg').className='msg err'; return; }

  const payload = {
    course_num,
    section_id: document.getElementById('acSectionId').value.trim(),
    title:      document.getElementById('acTitle').value.trim(),
    semester:   document.getElementById('acSemester').value.trim(),
    term:       document.getElementById('acTerm').value.trim(),
    delivery:   document.getElementById('acDelivery').value,
    days_times: document.getElementById('acDaysTimes').value.trim(),
    start_date: document.getElementById('acStartDate').value,
    end_date:   document.getElementById('acEndDate').value,
    location:   document.getElementById('acLocation').value.trim(),
  };

  fetch(API+'/acc/admin/courses/create',{
    method:'POST',
    headers:authHeaders(),
    body:JSON.stringify(payload)
  }).then(r=>r.json()).then(d=>{
    if(d.ok){
      closeAddCourse();
      loadCourses();
    } else {
      document.getElementById('acMsg').textContent = d.error || 'Error saving course.';
      document.getElementById('acMsg').className='msg err';
    }
  }).catch(()=>{
    document.getElementById('acMsg').textContent='Network error.';
    document.getElementById('acMsg').className='msg err';
  });
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
