<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Upload</title>
<link rel="stylesheet" href="../theme.css">
<style>
body{font-family:system-ui,-apple-system,sans-serif;}
.wrap{max-width:560px;margin:80px auto;padding:2rem;}
h1{font-size:1.4rem;margin:0 0 1.5rem;}
.drop{border:2px dashed var(--border,#ccc);border-radius:8px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;display:block;}
.drop:hover,.drop.drag{border-color:#1a7a4a;background:#f5fbf7;}
.drop p{margin:.5rem 0;color:#666;}
.drop .file{font-weight:600;color:#1a7a4a;}
.drop input{display:none;}
.actions{margin-top:1.5rem;display:flex;gap:.75rem;justify-content:center;}
button.ct-btn{padding:.55rem 1.2rem;font-size:.95rem;cursor:pointer;border-radius:4px;border:1px solid #ccc;background:#fff;}
button.ct-btn.primary{background:#1a7a4a;color:#fff;border-color:#1a7a4a;}
button.ct-btn:disabled{opacity:.4;cursor:not-allowed;}
.msg{margin-top:1rem;font-size:.9rem;min-height:1.2em;text-align:center;}
.msg.ok{color:#1a7a4a;} .msg.err{color:#c00;}
.up-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;}
.up-modal.open{display:flex;}
.up-modal-inner{background:#fff;padding:2rem;border-radius:8px;max-width:380px;width:90%;}
.up-modal-inner h3{margin:0 0 1rem;font-size:1.1rem;}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="/admin/" onclick="location.replace('/admin/');return false;" class="crest">Russell Holloway <span class="num">ACC · Admin</span></a>
  </div>
</header>

<main id="main-content">

<!-- LOGIN MODAL injected dynamically by openLogin() only on auth fail -->

<div class="wrap" id="adminPanel" style="display:none;">
  <h1>Upload</h1>
  <label class="drop" id="dropZone">
    <p id="dropText">Click or drop a file</p>
    <p class="file" id="fileName"></p>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.pdf,.docx,.doc">
  </label>
  <div class="actions">
    <button class="ct-btn primary" id="uploadBtn" onclick="doUpload()" disabled>Upload</button>
  </div>
  <div class="msg" id="msg"></div>
</div>

</main>

<script>
const API = 'https://tourcast-docker.onrender.com';
const API_KEY = 'c7852252558744ea5bef3c86136edbf31b5e3e556fd447454a4d37b06151b4e7';
const CREDS = { credentials: 'include' };
let AUTHED = false;

function authFetch(url, opts={}){
  const isForm = opts.body instanceof FormData;
  const headers = Object.assign(
    {'X-API-Key':API_KEY},
    isForm ? {} : {'Content-Type':'application/json'},
    opts.headers||{}
  );
  return fetch(API+url, Object.assign({}, CREDS, opts, {headers}));
}

// ── Boot ──────────────────────────────────────────────────────────
function showPanel(){
  AUTHED = true;
  document.getElementById('adminPanel').style.display='block';
}

function openLogin(){
  if(!document.getElementById('loginModal')){
    const html = '<div class="up-modal open" id="loginModal" onclick="loginOverlayClick(event)">'
      + '<div class="up-modal-inner">'
      + '<h3>Admin Sign In</h3>'
      + '<input type="password" id="loginPw" placeholder="Password" autofocus '
      + 'style="width:100%;padding:.55rem .7rem;border:1px solid #ccc;border-radius:4px;font-size:.95rem;margin-bottom:.75rem;box-sizing:border-box;" '
      + 'onkeydown="if(event.key===\'Enter\')submitLogin()">'
      + '<label style="display:flex;align-items:center;gap:.5rem;font-size:.85rem;margin-bottom:1rem;cursor:pointer;">'
      + '<input type="checkbox" id="loginRemember"> Remember this IP</label>'
      + '<div class="msg err" id="loginMsg" style="display:none;margin-bottom:.5rem;"></div>'
      + '<div style="display:flex;gap:.5rem;justify-content:flex-end;">'
      + '<button class="ct-btn" onclick="closeLogin()">Cancel</button>'
      + '<button class="ct-btn primary" onclick="submitLogin()">Sign In</button>'
      + '</div></div></div>';
    document.getElementById('main-content').insertAdjacentHTML('afterbegin', html);
    setTimeout(()=>document.getElementById('loginPw').focus(),50);
  }
}

function closeLogin(){
  const m = document.getElementById('loginModal');
  if(m) m.remove();
}

function loginOverlayClick(e){
  if(e.target.id==='loginModal') closeLogin();
}

function submitLogin(){
  const pw = document.getElementById('loginPw').value;
  const remember = document.getElementById('loginRemember').checked;
  const msg = document.getElementById('loginMsg');
  msg.style.display='none';
  authFetch('/acc/admin/password-auth',{
    method:'POST',
    body:JSON.stringify({password:pw, remember:remember})
  }).then(r=>r.json()).then(d=>{
    if(d.ok){ closeLogin(); showPanel(); }
    else {
      msg.textContent='Incorrect password.';
      msg.style.display='block';
    }
  }).catch(()=>{
    msg.textContent='Login failed.';
    msg.style.display='block';
  });
}

(function boot(){
  authFetch('/acc/admin/ip-auth',{method:'POST',body:JSON.stringify({})})
    .then(r=>r.json()).then(d=>{
      if(d.ok) showPanel();
      else openLogin();
    }).catch(()=>openLogin());
})();

// ── Upload ──────────────────────────────────────────────────────────
let selectedFile = null;
const zone   = document.getElementById('dropZone');
const input  = document.getElementById('fileInput');
const dropTx = document.getElementById('dropText');
const fname  = document.getElementById('fileName');
const btn    = document.getElementById('uploadBtn');

input.addEventListener('change', e => setFile(e.target.files[0]));

['dragenter','dragover'].forEach(ev => zone.addEventListener(ev, e => {
  e.preventDefault(); zone.classList.add('drag');
}));
['dragleave','drop'].forEach(ev => zone.addEventListener(ev, e => {
  e.preventDefault(); zone.classList.remove('drag');
}));
zone.addEventListener('drop', e => {
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});

function setFile(f) {
  if (!f) return;
  selectedFile = f;
  fname.textContent = f.name;
  dropTx.textContent = 'Click or drop to change';
  btn.disabled = false;
}

function doUpload(){
  if (!selectedFile) return;
  const msg = document.getElementById('msg');
  msg.textContent = 'Uploading…';
  msg.className = 'msg';
  btn.disabled = true;

  const fd = new FormData();
  fd.append('file', selectedFile);

  authFetch('/acc/admin/upload', { method: 'POST', body: fd })
    .then(r => r.json())
    .then(d => {
      if (d.ok) {
        msg.textContent = 'Uploaded: ' + d.filename;
        msg.className = 'msg ok';
        selectedFile = null;
        input.value = '';
        fname.textContent = '';
        dropTx.textContent = 'Click or drop a file';
      } else {
        msg.textContent = d.error || 'Upload failed.';
        msg.className = 'msg err';
        btn.disabled = false;
      }
    })
    .catch(e => {
      msg.textContent = 'Upload failed: ' + e.message;
      msg.className = 'msg err';
      btn.disabled = false;
    });
}
</script>

</body>
</html>
