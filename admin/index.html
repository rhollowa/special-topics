<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Upload</title>
<link rel="stylesheet" href="../theme.css">
<style>
body{font-family:system-ui,-apple-system,sans-serif;}
.wrap{max-width:760px;margin:80px auto;padding:2rem;}
h1{font-size:1.4rem;margin:0 0 1.5rem;}
.drop{border:2px dashed var(--border,#ccc);border-radius:8px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;display:block;}
.drop:hover,.drop.drag{border-color:#1a7a4a;background:#f5fbf7;}
.drop p{margin:.5rem 0;color:#666;}
.drop .file{font-weight:600;color:#1a7a4a;}
.drop input{display:none;}
.actions{margin-top:1.5rem;display:flex;gap:.75rem;justify-content:center;}
button.ct-btn{padding:.55rem 1.2rem;font-size:.95rem;cursor:pointer;border-radius:4px;border:1px solid #ccc;background:#fff;}
button.ct-btn.primary{background:#1a7a4a;color:#fff;border-color:#1a7a4a;}
button.ct-btn:disabled{opacity:.4;cursor:not-allowed;}
.msg{margin-top:1rem;font-size:.9rem;min-height:1.2em;text-align:center;}
.msg.ok{color:#1a7a4a;} .msg.err{color:#c00;}
.up-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;}
.up-modal.open{display:flex;}
.up-modal-inner{background:#fff;padding:2rem;border-radius:8px;max-width:380px;width:90%;}
.up-modal-inner h3{margin:0 0 1rem;font-size:1.1rem;}
.picker{margin-top:2.5rem;padding-top:2rem;border-top:1px solid #eee;}
.picker h2{font-size:1.1rem;margin:0 0 .75rem;}
.picker select{width:100%;padding:.55rem .7rem;border:1px solid #ccc;border-radius:4px;font-size:.9rem;background:#fff;}
.picker .pick-actions{margin-top:1rem;display:flex;gap:.5rem;justify-content:flex-end;}
.act-modal-inner{background:#fff;padding:2rem;border-radius:8px;max-width:440px;width:90%;}
.act-modal-inner h3{margin:0 0 .5rem;font-size:1.1rem;}
.act-modal-inner .fname{font-size:.85rem;color:#666;margin-bottom:1.25rem;word-break:break-all;}
.act-modal-inner .act-buttons{display:flex;flex-direction:column;gap:.5rem;}
.act-modal-inner .act-buttons button{padding:.7rem 1rem;text-align:left;}
.act-modal-inner .close-row{margin-top:1rem;display:flex;justify-content:flex-end;}
pre.receipt{background:#f5f5f5;padding:.75rem;border-radius:4px;font-size:.8rem;max-height:240px;overflow:auto;margin-top:1rem;}

/* ── Submissions panel ── */
.section-panel{margin-top:2.5rem;padding-top:2rem;border-top:1px solid #eee;}
.section-panel h2{font-size:1.1rem;margin:0 0 .75rem;}
.panel-controls{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem;}
.panel-controls select{padding:.5rem .7rem;border:1px solid #ccc;border-radius:4px;font-size:.9rem;background:#fff;min-width:180px;}
.panel-controls button{padding:.5rem 1rem;font-size:.88rem;}
.sub-table-wrap{border:1px solid #e0e0e0;border-radius:6px;overflow:hidden;margin-top:.5rem;}
.sub-table{width:100%;border-collapse:collapse;font-size:.88rem;}
.sub-table thead{background:#f8f8f8;}
.sub-table th{padding:.6rem .9rem;text-align:left;font-weight:600;color:#555;border-bottom:1.5px solid #e0e0e0;white-space:nowrap;}
.sub-table td{padding:.6rem .9rem;border-bottom:1px solid #f0f0f0;color:#222;vertical-align:middle;}
.sub-table tr:last-child td{border-bottom:none;}
.sub-table tr:hover td{background:#fafff8;}
.sub-count{font-size:.82rem;color:#888;margin-bottom:.4rem;}
.dl-link{color:#1a7a4a;font-weight:600;font-size:.82rem;cursor:pointer;background:none;border:none;padding:0;text-decoration:underline;}
.empty-sub{text-align:center;padding:2rem;color:#aaa;font-size:.9rem;}
.badge{display:inline-block;padding:.15rem .5rem;border-radius:20px;font-size:.75rem;font-weight:600;background:#e8f8f0;color:#1a7a4a;}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="/admin/" onclick="location.replace('/admin/');return false;" class="crest">Russell Holloway <span class="num">ACC · Admin</span></a>
  </div>
</header>

<main id="main-content">

<div class="wrap" id="adminPanel" style="display:none;">
  <h1>Upload</h1>
  <label class="drop" id="dropZone">
    <p id="dropText">Click or drop a file</p>
    <p class="file" id="fileName"></p>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.pdf,.docx,.doc">
  </label>
  <div class="actions">
    <button class="ct-btn primary" id="uploadBtn" onclick="doUpload()" disabled>Upload</button>
  </div>
  <div class="msg" id="msg"></div>

  <!-- File picker -->
  <div class="picker">
    <h2>Process an uploaded file</h2>
    <select id="filePicker">
      <option value="">— Select a file —</option>
    </select>
    <div class="pick-actions">
      <button class="ct-btn" onclick="refreshFileList()">Refresh</button>
      <button class="ct-btn primary" id="openActBtn" onclick="openActionDialog()" disabled>Open</button>
    </div>
    <div class="msg" id="pickMsg"></div>
  </div>

  <!-- BUSI-2305 Submissions -->
  <div class="section-panel">
    <h2>BUSI-2305 Submissions</h2>
    <div class="panel-controls">
      <select id="sectionPicker" onchange="loadSubmissions()">
        <option value="">— All sections —</option>
      </select>
      <button class="ct-btn" onclick="refreshSubmissions()">Refresh</button>
    </div>
    <div class="sub-count" id="subCount"></div>
    <div id="subTableWrap"></div>
  </div>
</div>

</main>

<script>
const API = 'https://tourcast-docker.onrender.com';
const API_KEY = 'c7852252558744ea5bef3c86136edbf31b5e3e556fd447454a4d37b06151b4e7';
const CREDS = { credentials: 'include' };
let AUTHED = false;
let ALL_SUBMISSIONS = [];

function authFetch(url, opts={}){
  const isForm = opts.body instanceof FormData;
  const headers = Object.assign(
    {'X-API-Key':API_KEY},
    isForm ? {} : {'Content-Type':'application/json'},
    opts.headers||{}
  );
  return fetch(API+url, Object.assign({}, CREDS, opts, {headers}));
}

// ── Boot ──────────────────────────────────────────────────────────
function showPanel(){
  AUTHED = true;
  document.getElementById('adminPanel').style.display='block';
  refreshFileList();
  refreshSubmissions();
}

function openLogin(){
  if(!document.getElementById('loginModal')){
    const html = '<div class="up-modal open" id="loginModal" onclick="loginOverlayClick(event)">'
      + '<div class="up-modal-inner">'
      + '<h3>Admin Sign In</h3>'
      + '<input type="password" id="loginPw" placeholder="Password" autofocus '
      + 'style="width:100%;padding:.55rem .7rem;border:1px solid #ccc;border-radius:4px;font-size:.95rem;margin-bottom:.75rem;box-sizing:border-box;" '
      + 'onkeydown="if(event.key===\'Enter\')submitLogin()">'
      + '<label style="display:flex;align-items:center;gap:.5rem;font-size:.85rem;margin-bottom:1rem;cursor:pointer;">'
      + '<input type="checkbox" id="loginRemember"> Remember this IP</label>'
      + '<div class="msg err" id="loginMsg" style="display:none;margin-bottom:.5rem;"></div>'
      + '<div style="display:flex;gap:.5rem;justify-content:flex-end;">'
      + '<button class="ct-btn" onclick="closeLogin()">Cancel</button>'
      + '<button class="ct-btn primary" onclick="submitLogin()">Sign In</button>'
      + '</div></div></div>';
    document.getElementById('main-content').insertAdjacentHTML('afterbegin', html);
    setTimeout(()=>document.getElementById('loginPw').focus(),50);
  }
}

function closeLogin(){
  const m = document.getElementById('loginModal');
  if(m) m.remove();
}

function loginOverlayClick(e){
  if(e.target.id==='loginModal') closeLogin();
}

function submitLogin(){
  const pw = document.getElementById('loginPw').value;
  const remember = document.getElementById('loginRemember').checked;
  const msg = document.getElementById('loginMsg');
  msg.style.display='none';
  authFetch('/acc/admin/password-auth',{
    method:'POST',
    body:JSON.stringify({password:pw, remember:remember})
  }).then(r=>r.json()).then(d=>{
    if(d.ok){ closeLogin(); showPanel(); }
    else {
      msg.textContent='Incorrect password.';
      msg.style.display='block';
    }
  }).catch(()=>{
    msg.textContent='Login failed.';
    msg.style.display='block';
  });
}

(function boot(){
  authFetch('/acc/admin/ip-auth',{method:'POST',body:JSON.stringify({})})
    .then(r=>r.json()).then(d=>{
      if(d.ok) showPanel();
      else openLogin();
    }).catch(()=>openLogin());
})();

// ── Upload ──────────────────────────────────────────────────────────
let selectedFile = null;
const zone   = document.getElementById('dropZone');
const input  = document.getElementById('fileInput');
const dropTx = document.getElementById('dropText');
const fname  = document.getElementById('fileName');
const btn    = document.getElementById('uploadBtn');

input.addEventListener('change', e => setFile(e.target.files[0]));

['dragenter','dragover'].forEach(ev => zone.addEventListener(ev, e => {
  e.preventDefault(); zone.classList.add('drag');
}));
['dragleave','drop'].forEach(ev => zone.addEventListener(ev, e => {
  e.preventDefault(); zone.classList.remove('drag');
}));
zone.addEventListener('drop', e => {
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});

function setFile(f) {
  if (!f) return;
  selectedFile = f;
  fname.textContent = f.name;
  dropTx.textContent = 'Click or drop to change';
  btn.disabled = false;
}

function doUpload(){
  if (!selectedFile) return;
  const msg = document.getElementById('msg');
  msg.textContent = 'Uploading…';
  msg.className = 'msg';
  btn.disabled = true;

  const fd = new FormData();
  fd.append('file', selectedFile);

  authFetch('/acc/admin/upload', { method: 'POST', body: fd })
    .then(r => r.json())
    .then(d => {
      if (d.ok) {
        msg.textContent = 'Uploaded: ' + d.filename;
        msg.className = 'msg ok';
        selectedFile = null;
        input.value = '';
        fname.textContent = '';
        dropTx.textContent = 'Click or drop a file';
        refreshFileList();
      } else {
        msg.textContent = d.error || 'Upload failed.';
        msg.className = 'msg err';
        btn.disabled = false;
      }
    })
    .catch(e => {
      msg.textContent = 'Upload failed: ' + e.message;
      msg.className = 'msg err';
      btn.disabled = false;
    });
}

// ── File picker ──────────────────────────────────────────────────────
function refreshFileList(){
  const sel = document.getElementById('filePicker');
  const openBtn = document.getElementById('openActBtn');
  const pickMsg = document.getElementById('pickMsg');
  pickMsg.textContent = '';
  pickMsg.className = 'msg';
  openBtn.disabled = true;

  authFetch('/acc/admin/uploads', { method: 'GET' })
    .then(r => r.json())
    .then(d => {
      sel.innerHTML = '<option value="">— Select a file —</option>';
      if (!d.ok) {
        pickMsg.textContent = d.error || 'List failed.';
        pickMsg.className = 'msg err';
        return;
      }
      const files = (d.files || []).slice().sort((a,b) =>
        (b.uploaded_at || '').localeCompare(a.uploaded_at || '')
      );
      files.forEach(f => {
        const o = document.createElement('option');
        o.value = f.key;
        o.textContent = f.filename;
        sel.appendChild(o);
      });
    })
    .catch(e => {
      pickMsg.textContent = 'List failed: ' + e.message;
      pickMsg.className = 'msg err';
    });
}

document.getElementById('filePicker').addEventListener('change', e => {
  document.getElementById('openActBtn').disabled = !e.target.value;
});

function openActionDialog(){
  const sel = document.getElementById('filePicker');
  const key = sel.value;
  if (!key) return;
  const filename = sel.options[sel.selectedIndex].text;

  const existing = document.getElementById('actModal');
  if (existing) existing.remove();

  const html =
    '<div class="up-modal open" id="actModal" onclick="actOverlayClick(event)">'
    + '<div class="act-modal-inner">'
    + '<h3>What do you want to do with this file?</h3>'
    + '<div class="fname">' + filename.replace(/</g,'&lt;') + '</div>'
    + '<div class="act-buttons">'
    + '<button class="ct-btn primary" onclick="actCreateClass()">Create new class</button>'
    + '<button class="ct-btn">Update grades</button>'
    + '<button class="ct-btn">Post to site</button>'
    + '</div>'
    + '<div class="msg" id="actMsg"></div>'
    + '<div class="close-row"><button class="ct-btn" onclick="closeActModal()">Close</button></div>'
    + '</div></div>';

  document.getElementById('main-content').insertAdjacentHTML('beforeend', html);
  document.getElementById('actModal').dataset.key = key;
}

function actOverlayClick(e){
  if (e.target.id === 'actModal') closeActModal();
}

function closeActModal(){
  const m = document.getElementById('actModal');
  if (m) m.remove();
}

function actCreateClass(){
  const modal = document.getElementById('actModal');
  const key = modal.dataset.key;
  const actMsg = document.getElementById('actMsg');
  actMsg.textContent = 'Processing…';
  actMsg.className = 'msg';

  authFetch('/acc/admin/process/create-class', {
    method: 'POST',
    body: JSON.stringify({ key: key })
  })
    .then(r => r.json())
    .then(d => {
      if (d.ok) {
        actMsg.className = 'msg ok';
        actMsg.innerHTML =
          'Created class — section ' + d.section_id + ' (' + d.row_count + ' rows)'
          + '<pre class="receipt">' + JSON.stringify(d, null, 2) + '</pre>';
      } else {
        actMsg.className = 'msg err';
        actMsg.textContent = d.error || 'Processor failed.';
      }
    })
    .catch(e => {
      actMsg.className = 'msg err';
      actMsg.textContent = 'Request failed: ' + e.message;
    });
}

// ── Submissions panel ────────────────────────────────────────────────

function refreshSubmissions(){
  authFetch('/acc/admin/submissions', { method: 'GET' })
    .then(r => r.json())
    .then(d => {
      if (!d.ok) { renderSubTable([]); return; }
      ALL_SUBMISSIONS = (d.files || []).map(f => {
        // key: submissions/{course}/{date}/{filename}
        const parts = f.key.split('/');
        const course = parts[1] || '';
        const dateStr = parts[2] || '';
        // filename pattern: FirstName_LastName_AssignmentName.xlsx
        const rawName = f.filename.replace(/\.[^.]+$/, ''); // strip ext
        const nameParts = rawName.split('_');
        const student = nameParts.length >= 2
          ? nameParts[0] + ' ' + nameParts[1]
          : rawName;
        const assignment = nameParts.slice(2).join(' ') || '—';
        return { ...f, course, dateStr, student, assignment };
      });

      // Populate section dropdown from unique courses
      const courses = [...new Set(ALL_SUBMISSIONS.map(s => s.course))].sort();
      const sel = document.getElementById('sectionPicker');
      const prev = sel.value;
      sel.innerHTML = '<option value="">— All sections —</option>';
      courses.forEach(c => {
        const o = document.createElement('option');
        o.value = c;
        o.textContent = c;
        sel.appendChild(o);
      });
      if (prev) sel.value = prev;

      loadSubmissions();
    })
    .catch(() => renderSubTable([]));
}

function loadSubmissions(){
  const filter = document.getElementById('sectionPicker').value;
  const filtered = filter
    ? ALL_SUBMISSIONS.filter(s => s.course === filter)
    : ALL_SUBMISSIONS;
  renderSubTable(filtered);
}

function renderSubTable(rows){
  const wrap = document.getElementById('subTableWrap');
  const count = document.getElementById('subCount');
  count.textContent = rows.length + ' submission' + (rows.length !== 1 ? 's' : '');

  if (!rows.length) {
    wrap.innerHTML = '<div class="sub-table-wrap"><div class="empty-sub">No submissions yet.</div></div>';
    return;
  }

  // Sort newest first
  rows = rows.slice().sort((a,b) => b.uploaded_at.localeCompare(a.uploaded_at));

  const rowsHtml = rows.map((r, i) => {
    const dt = new Date(r.uploaded_at);
    const dtStr = dt.toLocaleDateString('en-US', {month:'numeric',day:'numeric',year:'numeric'})
      + ' ' + dt.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});
    const kb = (r.size / 1024).toFixed(1) + ' KB';
    return `<tr>
      <td>${i+1}</td>
      <td>${esc(r.student)}</td>
      <td><span class="badge">${esc(r.course)}</span></td>
      <td>${esc(r.assignment)}</td>
      <td>${esc(r.filename)}</td>
      <td>${dtStr}</td>
      <td>${kb}</td>
      <td><button class="dl-link" onclick="downloadSub('${esc(r.key)}','${esc(r.filename)}')">Download</button></td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<div class="sub-table-wrap">
    <table class="sub-table">
      <thead><tr>
        <th>#</th><th>Student</th><th>Course</th><th>Assignment</th>
        <th>File</th><th>Submitted</th><th>Size</th><th></th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  </div>`;
}

function downloadSub(key, filename){
  // Proxy through the backend to serve the R2 file
  const url = API + '/acc/admin/submissions/' + encodeURIComponent(key);
  fetch(url, { headers: { 'X-API-Key': API_KEY }, credentials: 'include' })
    .then(r => r.blob())
    .then(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    })
    .catch(() => alert('Download failed.'));
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>

</body>
</html>
